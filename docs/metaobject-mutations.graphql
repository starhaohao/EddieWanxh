# =============================================================================
# FABRIC — ALIGN EXISTING "Fabric Profile" → target "Fabric" schema
# =============================================================================
# The existing "Fabric Profile" was created by the Claude Connector App, so its
# type handle may be app-namespaced (e.g. app--123--fabric_profile) and its
# fields may be locked. Two paths:
#
#   PATH A (recommended if editable): rename + add missing fields in place.
#     1. Get its ID + current field keys from STEP 0.
#     2. Fill in <FABRIC_PROFILE_DEFINITION_ID> below and run.
#     3. Only include fieldDefinitions you need to CREATE (omit ones that exist).
#
#   PATH B (if app-owned / locked): create a clean "fabric" def (uncomment the
#     CreateFabric mutation) and migrate the 1 existing entry manually.
# -----------------------------------------------------------------------------

# PATH A — update in place
mutation AlignFabricProfile {
  metaobjectDefinitionUpdate(
    id: "<FABRIC_PROFILE_DEFINITION_ID>"
    definition: {
      name: "Fabric"
      access: { storefront: PUBLIC_READ }
      fieldDefinitions: [
        # Keep/rename existing ones as needed; below are the CREATE ops.
        # Remove any whose key already exists to avoid "key taken" errors.
        { create: { key: "fabric_name",       name: "Fabric Name",       type: "single_line_text_field" } }
        { create: { key: "short_description",  name: "Short Description", type: "single_line_text_field" } }
        { create: { key: "full_description",   name: "Full Description",  type: "multi_line_text_field" } }
        { create: { key: "key_benefits",       name: "Key Benefits",      type: "list.single_line_text_field" } }
        { create: { key: "composition",        name: "Composition",       type: "multi_line_text_field" } }
        { create: { key: "care_notes",         name: "Care Notes",        type: "multi_line_text_field" } }
      ]
    }
  ) {
    metaobjectDefinition { id name type fieldDefinitions { key name } }
    userErrors { field message code }
  }
}

