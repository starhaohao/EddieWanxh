# =============================================================================
# TRIIIPLE — Metaobject Definitions v1.0
# Shopify Admin GraphQL — metaobjectDefinitionCreate mutations
# =============================================================================
#
# HOW TO RUN
#   1. Install the "Shopify GraphiQL App" (or use the Admin API in a dev tool).
#   2. Set API version to a recent stable (e.g. 2025-07).
#   3. Paste and run each named operation below ONE AT A TIME.
#      (GraphiQL runs a single named operation per execution.)
#
# ASSUMPTIONS (change any before running)
#   - Design Features / Trust Badges / Product Highlights = 3 SEPARATE defs.
#   - Recommended Pairing = list.product_reference (links real products).
#   - All defs are storefront-readable (so the theme can render them) and
#     publishable (Active/Draft), matching your current store.
#   - Icons are image files (file_type_options restricted to ["Image"]).
#   - Story Salon already exists → NOT recreated (see STEP 0 to verify fields).
#   - Fabric = align existing "Fabric Profile" → see FABRIC section at bottom.
# =============================================================================


# -----------------------------------------------------------------------------
# STEP 0 — DISCOVERY: list existing definitions + their IDs, types, fields.
# Run this first. Use it to (a) confirm handles aren't already taken and
# (b) grab the Fabric Profile / Story Salon / FAQ definition IDs.
# -----------------------------------------------------------------------------
query ListMetaobjectDefinitions {
  metaobjectDefinitions(first: 50) {
    edges {
      node {
        id
        name
        type
        fieldDefinitions {
          key
          name
          type { name }
        }
      }
    }
  }
}


# -----------------------------------------------------------------------------
# 1. PRODUCT PHILOSOPHY  ⭐  (type: product_philosophy)
# -----------------------------------------------------------------------------
mutation CreateProductPhilosophy {
  metaobjectDefinitionCreate(definition: {
    name: "Product Philosophy"
    type: "product_philosophy"
    displayNameKey: "product_name"
    access: { storefront: PUBLIC_READ }
    capabilities: { publishable: { enabled: true } }
    fieldDefinitions: [
      { key: "collection_code",     name: "Collection Code",     type: "single_line_text_field" }
      { key: "product_name",        name: "Product Name",        type: "single_line_text_field" }
      { key: "design_philosophy",   name: "Design Philosophy",   type: "single_line_text_field" }
      { key: "signature_quote",     name: "Signature Quote",     type: "single_line_text_field" }
      { key: "at_a_glance",         name: "At a Glance",         type: "multi_line_text_field" }
      { key: "designed_for",        name: "Designed For",        type: "single_line_text_field" }
      { key: "why_youll_love_it",   name: "Why You'll Love It",  type: "rich_text_field" }
      { key: "recommended_pairing", name: "Recommended Pairing", type: "list.product_reference" }
    ]
  }) {
    metaobjectDefinition { id name type }
    userErrors { field message code }
  }
}


# -----------------------------------------------------------------------------
# 2. DESIGN FEATURES  (type: design_feature)
# -----------------------------------------------------------------------------
mutation CreateDesignFeature {
  metaobjectDefinitionCreate(definition: {
    name: "Design Features"
    type: "design_feature"
    displayNameKey: "title"
    access: { storefront: PUBLIC_READ }
    capabilities: { publishable: { enabled: true } }
    fieldDefinitions: [
      { key: "title",       name: "Title",       type: "single_line_text_field" }
      { key: "description",  name: "Description", type: "multi_line_text_field" }
      { key: "icon",         name: "Icon",        type: "file_reference",
        validations: [{ name: "file_type_options", value: "[\"Image\"]" }] }
    ]
  }) {
    metaobjectDefinition { id name type }
    userErrors { field message code }
  }
}


