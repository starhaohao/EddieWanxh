# 9. LOCALIZATION DICTIONARY  ⭐  (type: localization_entry)
# -----------------------------------------------------------------------------
mutation CreateLocalizationEntry {
  metaobjectDefinitionCreate(definition: {
    name: "Localization Dictionary"
    type: "localization_entry"
    displayNameKey: "english"
    access: { storefront: PUBLIC_READ }
    capabilities: { publishable: { enabled: true } }
    fieldDefinitions: [
      { key: "english",             name: "English",             type: "single_line_text_field" }
      { key: "simplified_chinese",  name: "Simplified Chinese",  type: "single_line_text_field" }
      { key: "traditional_chinese", name: "Traditional Chinese", type: "single_line_text_field" }
      { key: "japanese",            name: "Japanese",            type: "single_line_text_field" }
      { key: "korean",              name: "Korean",              type: "single_line_text_field" }
      { key: "status",              name: "Status",              type: "single_line_text_field",
        validations: [{ name: "choices", value: "[\"Approved\",\"Draft\",\"Review\"]" }] }
      { key: "notes",               name: "Notes",               type: "multi_line_text_field" }
    ]
  }) {
    metaobjectDefinition { id name type }
    userErrors { field message code }
  }
}


